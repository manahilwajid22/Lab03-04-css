<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 3 & 4-CSS Fundamentals: Form Styling</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-color: plum; /* Background color added */
        padding: 20px;
    }

    .heading {
        margin: 20px 0;
        text-align: center;
        font-size: 22px;
        color: white; /* White text for contrast */
    }

    /* Form container */
    .form-container {
        position: relative;
        width: 90%;
        max-width: 400px;
        margin: 20px auto; /* center horizontally */
        background: rgb(243, 220, 243);
        padding: 30px 40px;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: black;
        font-size: 18px;
    }

    /* Form groups */
    .form-box {
        margin-bottom: 10px;
        position: relative;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: black;
    }

    input, select {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid black;
        border-radius: 8px;
        background-color: white;
        outline: none;
        transition: all 0.3s ease;
    }

    input:focus, select:focus {
        border-color: #007bff;
        box-shadow: 0 0 6px rgba(0,123,255,0.3);
    }

    input.error, select.error {
        border-color: #e74c3c;
    }

    small.error {
        color: #e74c3c;
        display: none;
        position: absolute;
        bottom: -18px;
        left: 0;
        font-size: 12px;
    }

    .success-message {
        color: #27ae60;
        text-align: center;
        margin-top: 15px;
        display: none;
    }

    /* Submit Button */
    .btn {
        display: block;        
        margin: 20px auto 0;  
        padding: 12px;
        width: 100%;
        background: linear-gradient(100deg, #942b94, #4d0350);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(183, 76, 204, 0.3);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .form-container {
            padding: 20px;
            width: 95%;
        }

        input, select {
            padding: 8px 10px;
        }

        .btn {
            padding: 10px;
        }

        .form-container h2 {
            font-size: 16px;
        }
    }
</style>
</head>
<body>

<h1 class="heading">This is Form Page of Lab Task</h1>
<h1 class="heading">Task 6: Form Styling</h1>

<div class="form-container">
    <h2>Registration Form</h2>
    <form class="form">
        <div class="form-box">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your Name">
            <small class="error">Name is required</small>
        </div>
        <div class="form-box">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your Email">
            <small class="error">Email is required</small>
        </div>
        <div class="form-box">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password">
            <small class="error">Password must be 6+ characters</small>
        </div>
        <div class="form-box">
            <label for="gender">Gender</label>
            <select id="gender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <button type="submit" class="btn">Submit</button>
        <p class="success-message">Registration Successfully!</p>
    </form>
</div>

</body>
</html>
